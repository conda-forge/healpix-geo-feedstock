# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.0.11"

recipe:
  name: healpix-geo
  version: ${{ version }}

source:
  url: https://github.com/eopf-dggs/healpix-geo/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3b929838f117c9456d8e90ac4ae6800a7a923c24710ddf2d886e2535b9266ea4

build:
  number: 1

  skip:
    - match(python, "<3.10")

outputs:
  - package:
      name: healpix-geo

    build:
      script:
        - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
        - python -m pip install . -vv --no-build-isolation --no-deps

    requirements:
      build:
        - if: build_platform != target_platform
          then:
            - python
            - cross-python_${{ target_platform }}
            - maturin >=1.7.0,<2.0
        - cargo-bundle-licenses
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - ${{ compiler('rust') }}
      host:
        - python ${{ python_min }}.*
        - maturin >=1.7.0,<2.0
        - pip
      run:
        - python >=${{ python_min }}
        - numpy

    tests:
      - python:
          imports:
          - healpix_geo
          - healpix_geo.nested
          - healpix_geo.ring
          - healpix_geo.slices
          pip_check: true

  - package:
      name: ${{ name|lower|replace('-', '_') }}

    build:
      noarch: generic

    requirements:
      run:
        - ${{ pin_subpackage("healpix-geo", exact=True) }}

    tests:
      - python:
          imports:
          - healpix_geo
          pip_check: true

    about:
      license_file:
        - LICENSE

about:
  homepage: https://github.com/eopf-dggs/healpix-geo
  summary: 'healpix for the geo-sciences'
  description: |
    healpix-geo uses the cdshealpix, moc, and geodesy crates to provide
    specialized algorithms for the geosciences.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://healpix-geo.readthedocs.io/
  repository: https://github.com/eopf-dggs/healpix-geo

extra:
  recipe-maintainers:
    - keewis
